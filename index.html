<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Outage Response</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0b1e3d, #1f4e79);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .navbar {
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: flex-end;
      position: absolute;
      top: 0;
      left: 0;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 25px;
      font-size: 16px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #ff4d4d;
    }

    /* Center Content */
    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 24px;
      font-weight: normal;
      margin-bottom: 20px;
      color: #ff4d4d;
    }

    p {
      max-width: 500px;
      font-size: 16px;
      line-height: 1.5;
      opacity: 0.9;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 32px;
      }

      h2 {
        font-size: 18px;
      }

      .nav-links a {
        margin-left: 15px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="nav-links">
      <a href="#">Response Plan Search</a>
      <a href="#">About</a>
      <a href="#">Contact Us</a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container">
    <h1>Outage Response</h1>
    <h2>Coming Soon</h2>
    <p>
      We're building a powerful platform to help 911 centers quickly access response plans
      and send critical notifications during system outages.
      <br><br>
      Stay tuned — something great is on the way.
    </p>
  </div>

  <!-- Footer -->
  <div class="footer">
    © 2026 Outage Response. All rights reserved.
  </div>

</body>
</html>
