<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - Outage Response</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0b1e3d, #1f4e79);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: flex-end;
      position: absolute;
      top: 0;
      left: 0;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 25px;
      font-size: 16px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #ff4d4d;
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 100px 20px 40px;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    form {
      max-width: 400px;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    input, textarea {
      margin-bottom: 15px;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
    }

    textarea {
      resize: none;
      height: 120px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 5px;
      background-color: #ff4d4d;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #cc0000;
    }

    .success-message {
      display: none;
      background: rgba(0, 200, 0, 0.15);
      border: 1px solid #00cc66;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="Response Plan Search/index.html">Response Plan Search</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact Us</a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container">
    <h1>Contact Us</h1>

    <div id="success" class="success-message">
      ✅ Your message has been sent successfully. We'll get back to you soon.
    </div>

    <form action="https://formspree.io/f/xlgovkqp" method="POST">

      <input type="text" name="name" placeholder="Your Name" required>

      <input type="email" name="email" placeholder="Your Email" required>

      <textarea name="message" placeholder="Your Message" required></textarea>

      <!-- Spam protection -->
      <input type="text" name="_gotcha" style="display:none">

      <!-- Redirect back with success flag -->
      <input type="hidden" name="_next" value="contact.html?success=true">

      <button type="submit">Send Message</button>

    </form>
  </div>

  <div class="footer">
    © 2026 Outage Response. All rights reserved.
  </div>

  <!-- Script to show success message -->
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("success") === "true") {
      document.getElementById("success").style.display = "block";
    }
  </script>

</body>
</html>
