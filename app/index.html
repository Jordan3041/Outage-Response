<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Outage Response | Agency Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1f2937">
</head>
<body>

  <nav class="app-nav">
    <div class="logo">OutageResponse</div>
    <a href="https://outageresponse.com" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
      Back to Website
    </a>
  </nav>

  <div class="app-shell">
    
    <div id="login-section" class="card" style="max-width: 520px; margin: 0 auto;">
      <h1>Agency Access</h1>
      <p style="text-align: center; color: #9ca3af; font-size: 0.9rem; margin-top: -10px; margin-bottom: 20px;">
        Enter your agency key to sync response plans.
      </p>
      
      <input type="text" id="agency-key" placeholder="Enter Agency Key" autocomplete="off">
      <button class="primary-btn" id="login-btn">Sync Agency Data</button>
      
      <div style="margin-top: 20px; font-size: 0.75rem; color: #4b5563; text-align: center;">
        Secure Offline-First Environment
      </div>
    </div>

    <div id="app-section" style="display:none;">
      <div class="card" id="main-app-card">
        <h1 id="agency-name-display">Dispatch Portal</h1>
        
        <div class="sync-status-wrapper" style="text-align: center; margin-bottom: 20px;">
          <span id="network-badge" class="sync-badge">
              <span id="network-dot" class="badge-dot"></span>
              <span id="network-text">Checking connection...</span>
          </span>
        </div>
        <div id="sync-timestamp-note" style="text-align: center; margin-bottom: 20px; display: none;">
            <span id="sync-time-text" style="font-size: 0.72rem; color: #64748b; background: rgba(0,0,0,0.2); padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);"></span>
        </div>

        <div class="search-wrapper">
          <input type="text" id="search-input" placeholder="Search Code..." autocomplete="off">
          <div id="autocomplete-list" class="autocomplete-container"></div>
        </div>
        <div id="active-result"></div>
        
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 40px 0;">

        <h2 style="text-align: center; margin-bottom: 30px; letter-spacing: -0.5px;">Local Status Board</h2>
        
        <div class="board-section-header">
          <h3>Active Incidents</h3>
          <div class="control-group">
            <input type="text" id="new-inc-type" placeholder="Type (e.g., Fire)">
            <input type="text" id="new-inc-loc" placeholder="Location">
            <button onclick="addIncident()" class="primary-btn danger-btn">+ Create</button>
          </div>
        </div>
        <div id="incident-grid" class="incident-grid"></div>

        <div class="board-section-header" style="margin-top: 40px;">
          <h3>Unit Roster</h3>
          <div class="control-group">
            <input type="text" id="new-unit-name" placeholder="Unit ID">
            <button onclick="addUnit()" class="primary-btn">+ Add Unit</button>
          </div>
        </div>
        <div id="unit-grid" class="unit-grid"></div>

        <span class="logout-text" onclick="logout()">Logout & Clear Cache</span>
      </div>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
